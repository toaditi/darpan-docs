StylesPath = styles
MinAlertLevel = warning
Vocab = Mintlify

[formats]
mdx = md

[*.mdx]
BasedOnStyles = Vale
Vale.Terms = NO
TokenIgnores = (?sm)((?:import|export) .+?$), \
(?<!`)(<\w+ ?.+ ?\/>)(?!`), \
(<[A-Z]\w+>.+?<\/[A-Z]\w+>), \
\{[^}]*\}
BlockIgnores = (?sm)^(<\w+\n .*\s\/>)$, \
(?sm)^({.+.*})
